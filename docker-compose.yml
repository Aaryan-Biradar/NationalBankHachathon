services:
  backend:
    build:
      context: .
      dockerfile: app/Dockerfile
    ports:
      - "${BACKEND_PORT:-8001}:8000"

  frontend:
    build:
      context: .
      dockerfile: webapp/Dockerfile
    environment:
      VITE_API_BASE_URL: http://localhost:${BACKEND_PORT:-8001}
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-5174}:5173"
